name: Get Unity Activation File (Official-Simple)
on: workflow_dispatch

jobs:
  activation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. GameCI公式のライセンス要求アクション（プロジェクト不要、これ単体で動く最小構成）
      - name: Request manual activation file
        uses: game-ci/unity-request-activation-file@v2
        id: get-alf

      # 2. 生成されたファイルをGitHubの画面からダウンロードできるようにする
      - name: Upload .alf Artifact
        uses: actions/upload-artifact@v4
        with:
          name: unity-activation-file
          path: ${{ steps.get-alf.outputs.filePath }}
