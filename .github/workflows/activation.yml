name: Get Unity Activation File (Official)
on: workflow_dispatch

jobs:
  activation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. 確実に .alf ファイルだけを生成させるコマンド
      - name: Request manual activation file
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/project" \
            -e "UNITY_LICENSE=" \
            unityci/editor:ubuntu-2022.3.20f1-base-3.0.0 \
            unity-editor \
            -logFile /dev/stdout \
            -manualLicenseFile \
            -quit

      # 2. 生成された .alf ファイルを GitHub にアップロード
      - name: Upload .alf Artifact
        uses: actions/upload-artifact@v4
        if: always() # 上のコマンドがエラー（終了コード1）になっても絶対に実行する
        with:
          name: unity-activation-file
          path: ./**/*.alf
