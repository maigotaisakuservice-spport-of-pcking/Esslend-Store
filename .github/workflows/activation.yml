name: Get Unity Activation File (No Docker)
on: workflow_dispatch

jobs:
  activation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Unityの極小版(Linux用)をダウンロードして解凍
      - name: Download Unity Editor
        run: |
          wget -q https://download.unity3d.com/download_unity/abc123xyz/LinuxEditorInstaller/Unity.tar.xz
          mkdir -p unity-editor
          tar -xf Unity.tar.xz -C unity-editor --strip-components=1 || true

      # 2. 直接Unityを実行して .alf ファイルを生成
      - name: Request manual activation file
        run: |
          ./unity-editor/Editor/Unity \
            -batchmode \
            -nographics \
            -logFile /dev/stdout \
            -manualLicenseFile \
            -quit || true

      # 3. 生成されたファイルをカレントディレクトリに集めてアップロード
      - name: Upload .alf Artifact
        uses: actions/upload-artifact@v4
        with:
          name: unity-activation-file
          path: |
            ./*.alf
            /home/runner/.local/share/unity3d/Unity/*.alf
