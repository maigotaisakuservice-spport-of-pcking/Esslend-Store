name: Get Unity Activation File (Final)
on: workflow_dispatch

jobs:
  activation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Unity公式のCDNから、Linux用エディタ（本物）を直接ダウンロードして解凍
      - name: Download Real Unity Editor (Linux)
        run: |
          wget -q https://download.unity3d.com/download_unity/90c1031af011/LinuxEditorInstaller/Unity.tar.xz
          mkdir -p unity-editor
          tar -xf Unity.tar.xz -C unity-editor --strip-components=1

      # 2. 直接Unityを実行して .alf ファイルを生成
      - name: Request manual activation file
        run: |
          ./unity-editor/Editor/Unity \
            -batchmode \
            -nographics \
            -logFile /dev/stdout \
            -manualLicenseFile \
            -quit || true

      # 3. 生成されたファイルを確実にアップロード
      - name: Upload .alf Artifact
        uses: actions/upload-artifact@v4
        with:
          name: unity-activation-file
          path: |
            ./*.alf
            /home/runner/.local/share/unity3d/Unity/*.alf
            /home/runner/Unity/*.alf
