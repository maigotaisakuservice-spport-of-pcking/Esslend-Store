name: Get Unity Activation File (New)
on: workflow_dispatch

jobs:
  activation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # わざとライセンス無しの状態でUnityを動かし、.alfを生成させる
      - uses: game-ci/unity-builder@v4
        id: unity-build
        continue-on-error: true # エラーになっても途中で止めない
        with:
          projectPath: .
          targetPlatform: StandaloneLinux64 # 何でもいいので軽量なプラットフォーム

      # 生成された .alf ファイルをダウンロードできるように保存
      - name: Upload .alf Artifact
        uses: actions/upload-artifact@v4
        with:
          name: unity-activation-file
          path: ./**/*.alf
