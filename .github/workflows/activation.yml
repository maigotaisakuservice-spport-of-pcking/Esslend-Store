name: Get Unity Activation File (Fixed)
on: workflow_dispatch

jobs:
  activation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. 正しいDockerイメージで .alf ファイルを生成
      - name: Request manual activation file
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/project" \
            unityci/editor:ubuntu-2022.3.20f1-1 \
            unity-editor \
            -logFile /dev/stdout \
            -manualLicenseFile \
            -quit || true 
            # ↑エラーでワークフローが途中で止まるのを防ぐため、あえて正常終了(true)扱いにします

      # 2. 生成された .alf ファイルを確実にアップロード
      - name: Upload .alf Artifact
        uses: actions/upload-artifact@v4
        with:
          name: unity-activation-file
          path: ./*.alf
