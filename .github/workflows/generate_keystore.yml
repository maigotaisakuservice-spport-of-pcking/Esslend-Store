name: Generate Android Keystore (Cloud)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore temp.keystore -alias tekipakipc -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "tekipaki2026gameesslend012KmaidjA" -keypass "tekipaki2026gameesslend012KmaidjA" \
            -dname "CN=TekipakiPC, OU=Dev, O=TekipakiPC, L=Saitama, S=Saitama, C=JP"

      - name: Convert to Base64 and Display
        run: |
          echo "==================== [COPY START] ===================="
          base64 -w 0 temp.keystore
          echo ""
          echo "==================== [COPY END] ===================="
          echo "Instructions: Copy the string above and save to GitHub Secret: ANDROID_KEYSTORE_BASE64"
